<section class="financing-container">
  <div class="content-wrapper">
    
    <div class="section-header">
      <span class="section-line"></span>
      <h2>Financing Solutions That Adapt to Your Business</h2>
    </div>

    <!-- Responsive Video -->
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/6a76nHuB_MI?autoplay=1&mute=1&start=1"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <p class="sub-heading">Fast and flexible financing for every season</p>

    <!-- Responsive Grid -->
    <div class="services-grid">
      <a *ngFor="let item of services" [routerLink]="item.link" class="service-card">
        {{ item.title }}
        <span class="arrow-icon">→</span>
      </a>
    </div>

  </div>
</section>
