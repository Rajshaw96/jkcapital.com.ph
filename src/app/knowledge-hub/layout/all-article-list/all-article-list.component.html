<app-hero-section
  title="Insights to Grow Your Business"
  subtitle="Expert knowledge on financing, growth strategies, and success stories from Filipino entrepreneurs​"
  buttonText=""
  buttonLink="/apply"
  image="assets/img/knowledge-hub/knowledge-hub-hero.jpg">
</app-hero-section>

<section class="news-wrapper">
  <!-- Loop through categories -->
  <div class="news-row" *ngFor="let category of categories">

    <!-- HEADER -->
    <div class="row-header">
      <div class="title-group">
        <h2 class="category-heading">{{ category }}</h2>
      </div>

      <div class="nav-controls">
        <button class="nav-btn"
                (click)="prev(category)"
                [disabled]="categoryStep[category] === 0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>

        <button class="nav-btn"
                (click)="next(category)"
                [disabled]="!canMoveForward(category)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SLIDER VIEWPORT -->
    <div class="slider-viewport">
      <div class="cards-track"
          [style.transform]="'translateX(-' + (categoryStep[category] * 100) + '%)'">

        <!-- CARD -->
        <div class="news-card" *ngFor="let item of newsData[category]">

          <div class="image-box">
            <img
              [src]="item.image || 'assets/img/default-blog.jpg'"
              [alt]="item.title"
              referrerpolicy="no-referrer"
              class="blog-image"
            />

            <!-- UPDATED DATE FIELD -->
            <div class="date-badge" *ngIf="item.createdAt">
              {{ item.createdAt | date:'MMM d, y' }}
            </div>
          </div>

          <div class="content-box">
            <span class="category-tag">{{ item.category }}</span>

            <h4 (click)="openBlog(item)" class="card-title">
              {{ item.title }}
            </h4>

            <div class="card-footer">
              <a class="read-more" (click)="openBlog(item)">
                Read Article
                <span class="arrow-icon">→</span>
              </a>
            </div>
          </div>

        </div>

      </div>
    </div>

  </div>
</section>
