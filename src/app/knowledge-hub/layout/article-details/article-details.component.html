<div class="article-page-container" *ngIf="article$ | async as article">
  <div class="content-wrapper">
    
    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
      <header class="article-header">
        <nav class="breadcrumb">Home / Our Blog</nav>
        <h1>{{ article.title }}</h1>
        <div class="meta">
          <span><i class="icon-user"></i> {{ article.author }}</span>
          <span><i class="icon-calendar"></i> {{ article.createdAt }}</span>
        </div>
      </header>

      <div class="featured-image">
        <img [src]="article.image" [alt]="article.title">
      </div>

      <article class="article-body" [innerHTML]="article.content">
        <!-- Content from API renders here -->
      </article>

      <!-- CTA Section (Blue Box in screenshot) -->
      <section class="cta-box">
        <h2>Your next big move starts here</h2>
        <p>Let's explore funding options tailored to your goals.</p>
        <button class="btn-cta">Get In Touch With Us</button>
      </section>
    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <!-- Search -->
      <div class="widget search-widget">
        <h3>Search</h3>
        <div class="search-group">
          <input type="text" #searchInput placeholder="Search for topic...">
          <button (click)="onSearch(searchInput.value)">Search</button>
        </div>
      </div>

      <!-- Categories -->
      <div class="widget">
        <h3>Categories</h3>
        <ul>
          <li *ngFor="let cat of article.category">
            <!-- <a href="#">{{ cat.name }} ({{ cat.count }})</a> -->
          </li>
        </ul>
      </div>

      <!-- Recent News -->
      <div class="widget">
        <h3>Recent News</h3>
        <div class="recent-item" *ngFor="let news of article.recentNews">
          <img [src]="news.image" alt="news">
          <div class="item-info">
            <a href="#">{{ news.title }}</a>
            <span>{{ news.createdAt }}</span>
          </div>
        </div>
      </div>

      <!-- Tags -->
      <div class="widget">
        <h3>Tags</h3>
        <div class="tag-cloud">
          <span class="tag" *ngFor="let tag of article.tags">{{ tag }}</span>
        </div>
      </div>
    </aside>

  </div>
</div>
