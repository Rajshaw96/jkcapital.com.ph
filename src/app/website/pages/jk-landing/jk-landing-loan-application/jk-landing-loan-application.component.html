<div class="page-container">
  <!-- HEADER -->
  <div class="section-header">
    <span class="section-line"></span>
    <h2>Take the next step - let's make your plan real.<br>Start your application</h2>
  </div>

  <!-- Main Form Container -->
  <div class="form-wrapper">
    <h3 class="form-main-title">LOAN APPLICATION FORM</h3>

    <form [formGroup]="loanForm" (ngSubmit)="onSubmit()">
      
      <!-- Section: Enter Your Details -->
      <section class="form-section">
        <h4 class="section-title">Enter Your Details</h4>
        
        <div class="row">
          <div class="form-group">
            <label>First Name <span class="required">*</span></label>
            <input type="text" formControlName="firstName" placeholder="e.g. John">
          </div>
          <div class="form-group">
            <label>Last Name <span class="required">*</span></label>
            <input type="text" formControlName="lastName" placeholder="e.g. Doe">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" formControlName="email" placeholder="e.g. john.doe@domain.com">
          </div>
          <div class="form-group">
            <label>Mobile Number <span class="required">*</span></label>
            <input type="text" formControlName="mobileNumber" placeholder="e.g. 909 087 6876">
          </div>
        </div>
      </section>

      <!-- Section: Business Details -->
      <section class="form-section">
        <h4 class="section-title">Business Details</h4>

        <div class="form-group full-width">
          <label>Business Name <span class="required">*</span></label>
          <input type="text" formControlName="businessName" placeholder="e.g. Rocklage Solutions">
        </div>

        <div class="form-group full-width">
          <label>Business Address <span class="required">*</span></label>
          <input type="text" formControlName="businessAddress" placeholder="e.g. Street Name, Building Name, Building Number, Landmark">
        </div>

        <div class="form-group full-width">
          <label>Which province is your business located in? <span class="required">*</span></label>
          <input type="text" formControlName="province" placeholder="e.g. Select Region / Province">
        </div>

        <div class="form-group full-width">
          <label>Address Line 1 <span class="required">*</span></label>
          <input type="text" formControlName="addressLine1" placeholder="e.g. Street Address">
        </div>
      </section>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">Submit</button>

    </form>
  </div>
</div>
