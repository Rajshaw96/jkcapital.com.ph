<section class="news-wrapper">

  <div class="news-row" *ngFor="let category of categories">

    <!-- HEADER -->
    <div class="row-header">

      <div class="title-group">
        <h2 class="category-heading">{{category}}</h2>
        <div class="accent-line"></div>
      </div>

      <div class="nav-controls">

        <button class="nav-btn"
                (click)="prev(category)"
                [disabled]="categoryStep[category] === 0">
          ❮
        </button>

        <button class="nav-btn"
                (click)="next(category)"
                [disabled]="!canMoveForward(category)">
          ❯
        </button>

      </div>

    </div>

    <!-- SLIDER -->
    <div class="slider-viewport">

      <div class="cards-track"
           [style.transform]="'translateX(-' + (categoryStep[category] * 100) + '%)'">

        <div class="news-card" *ngFor="let item of newsData[category]">

          <!-- BLOG IMAGE -->
          <div class="image-box">
            <img [src]="item.image" 
                [alt]="item.title" 
                class="blog-image"
                referrerpolicy="no-referrer"/>

            <div class="date-badge">
              {{item.date | date}}
            </div>
          </div>

          <!-- CONTENT -->
          <div class="content-box">

            <span class="category-tag">
              {{item.category}}
            </span>

            <h4>
              {{item.title}}
            </h4>

            <a class="read-more"
               (click)="openBlog(item)">
               Read Article →
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
